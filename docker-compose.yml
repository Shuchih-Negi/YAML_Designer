services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:80,http://localhost:5173,http://localhost:8000
    volumes:
      - agent_definitions:/app/agent_definitions

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  agent_definitions:
